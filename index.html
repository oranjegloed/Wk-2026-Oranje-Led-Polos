<!-- Bestelsectie voor de LED Polo -->
<div style="font-family: Arial, sans-serif; border: 1px solid #ff6600; padding: 20px; border-radius: 8px; max-width: 400px;">
    <h2 style="color: #ff6600;">Oranje Scrolling LED Polo</h2>
    <p>Selecteer uw maat om de bestelling af te ronden:</p>

    <!-- Maat selectie menu -->
    <select id="sizeSelector" style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px;">
        <option value="">-- Kies een maat --</option>
        <option value="Medium">Medium (M)</option>
        <option value="Large">Large (L)</option>
        <option value="X-Large">X-Large (XL)</option>
        <option value="XX-Large">XX-Large (XXL)</option>
        <option value="XXX-Large">XXX-Large (XXXL)</option>
    </select>

    <!-- Betaalknop -->
    <button onclick="redirectToPayPal()" style="background-color: #ff6600; color: white; border: none; padding: 12px 20px; width: 100%; font-size: 18px; font-weight: bold; border-radius: 4px; cursor: pointer;">
        Bestel Nu via PayPal
    </button>

    <p id="error" style="color: red; display: none; margin-top: 10px;">Selecteer a.u.b. eerst een maat.</p>
</div>

<script>
function redirectToPayPal() {
    const size = document.getElementById('sizeSelector').value;
    const errorMsg = document.getElementById('error');
    const paypalBaseUrl = "https://www.paypal.com/ncp/payment/NYM5Q3TPRJRSE";

    if (size === "") {
        errorMsg.style.display = "block";
    } else {
        errorMsg.style.display = "none";
        // We sturen de klant naar PayPal en voegen de maat toe als referentie
        // Let op: Bij een standaard NCP link ziet PayPal dit als 'referrer'
        window.location.href = paypalBaseUrl + "?custom=" + encodeURIComponent(size);
    }
}
</script>
